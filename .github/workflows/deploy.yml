name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  APP_NAME: robert-the-framer
  IMAGE_NAME: ghcr.io/mwithington/robert-the-framer
  HOMELAB_REPO: mwithington/homelab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and build
        run: npm ci && npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update image tag in homelab repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMELAB_REPO }}
          token: ${{ secrets.HOMELAB_DEPLOY_TOKEN }}
          path: homelab

      - name: Patch deployment image tag
        run: |
          cd homelab
          IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          # Requires yq v4 (available on ubuntu-latest runners)
          yq e ".spec.template.spec.containers[0].image = \"${IMAGE}\"" \
            -i "apps/${{ env.APP_NAME }}/deployment.yaml"

      - name: Commit and push updated tag
        run: |
          cd homelab
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "apps/${{ env.APP_NAME }}/deployment.yaml"
          git commit -m "chore: deploy ${{ env.APP_NAME }}@${{ github.sha }}"
          git push
